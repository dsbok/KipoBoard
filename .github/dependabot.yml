version: 2

updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "UTC"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

    groups:
      go-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
      timezone: "UTC"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"

    groups:
      github-actions:
        patterns:
          - "*"

  # Dockerfile base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "docker"

    labels:
      - "dependencies"
