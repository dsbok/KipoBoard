services:
  kipoboard:
    image: ghcr.io/dsbok/kipoboard:latest
    container_name: kipoboard

    user: "1000:1000"
    init: true

    restart: unless-stopped

    ports:
      - "0.0.0.0:5005:5005"

    dns:
      - 1.1.1.1
      - 1.0.0.1

    read_only: true

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    pids_limit: 100

    mem_limit: 512m
    cpus: "1.0"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5005/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
